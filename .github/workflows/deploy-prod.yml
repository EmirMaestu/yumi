name: deploy-prod
on:
  push:
    tags: ['v*']

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # build frontend
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-react/package-lock.json
      - run: cd web-react && npm install --no-audit --no-fund && npm run build

      # ssh setup + upload + deploy (un solo paso, robusto)
      - name: Deploy over SSH
        env:
          KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          REF: ${{ github.ref_name }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH="ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new"
          $SSH "$USER@$HOST" 'rm -rf ~/yumi/web-react/dist && mkdir -p ~/yumi/web-react'
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new -r web-react/dist "$USER@$HOST:~/yumi/web-react/dist"
          $SSH "$USER@$HOST" "cd ~/yumi && git fetch --all --tags -q && bash deploy/deploy.sh '$REF' prod"
